<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Mgmt api</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #667eea; color: white; padding: 10px 20px; cursor: pointer; margin: 5px 5px 5px 0; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Task Manager</h1>
    <input type="text" id="taskName" placeholder="your task here!">
    <textarea id="taskDec" placeholder="task description here!"></textarea>
    <button onclick="submitTask()">Create Task</button>
    <button onclick="loadTasks()">Show all Tasks</button>
    <div id="result"></div>
    
<script>
    const API_URL = "https://do-web-api.onrender.com/Task/";
    
    async function submitTask() {
        try {
            const task = document.getElementById("taskName").value.trim();
            const description = document.getElementById("taskDec").value.trim();

            if (!task) {
                document.getElementById('result').innerHTML = `❌ Error: Task name cannot be empty`;
                return;
            }

            document.getElementById('result').innerHTML = `⏳ Creating task...`;
            console.log('Sending request to:', API_URL);
            console.log('Payload:', { task, description });

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "task": task, "description": description })
            });

            console.log('Response status:', response.status);

            if (!response.ok) {
                throw new Error(`API Error: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            document.getElementById('result').innerHTML = `✅ Task created: ID ${data.task_id}`;
            
            // Clear inputs
            document.getElementById("taskName").value = '';
            document.getElementById("taskDec").value = '';
        } catch (error) {
            console.error('Full error details:', error);
            document.getElementById('result').innerHTML = `❌ Error: ${error.message}<br><small>Check console (F12) for details</small>`;
        }
    }

    async function loadTasks() {
        try {
            document.getElementById('result').innerHTML = `⏳ Loading tasks...`;
            
            const response = await fetch('https://do-web-api.onrender.com/Task/');
            
            if (!response.ok) {
                throw new Error(`API Error: ${response.status} ${response.statusText}`);
            }
            
            const tasks = await response.json();
            
            if (!Array.isArray(tasks) || tasks.length === 0) {
                document.getElementById('result').innerHTML = `📭 No tasks yet`;
                return;
            }
            
            document.getElementById('result').innerHTML = tasks.map(t => 
                `<p><strong>#${t.task_id}</strong>: ${t.task} - ${t.completed ? '✓ Done' : '⏳ Pending'}</p>`
            ).join('');
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('result').innerHTML = `❌ Error: ${error.message}`;
        }
    }
</script>

</body>
</html>
